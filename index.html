<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#101B2D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Harcama Defteri</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #101B2D; }
  body { -webkit-font-smoothing: antialiased; }
  .kd-select { appearance: none; -webkit-appearance: none; }
  .kd-btn-ghost:hover { background: rgba(201,162,75,0.12) !important; }
  .kd-row:hover .kd-row-actions { opacity: 1; }
  .kd-row-actions { opacity: 0.55; transition: opacity 0.15s ease; }
  input:focus, select:focus, textarea:focus { outline: 2px solid #C9A24B; outline-offset: 1px; }
  button:focus-visible { outline: 2px solid #C9A24B; outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_TITLE = "VİYANA · BUDAPEŞTE, 2026";

// TRY her zaman sabit taban para birimidir, silinemez.
const DEFAULT_CURRENCIES = {
  TRY: { symbol: "₺", flag: "🇹🇷" },
  USD: { symbol: "$", flag: "🇺🇸" },
  EUR: { symbol: "€", flag: "🇪🇺" },
  HUF: { symbol: "Ft", flag: "🇭🇺" },
};

// 1 birim döviz kaç TL eder. TRY listede yer almaz (her zaman 1 kabul edilir).
// Bunlar sadece başlangıç değeri — "Düzenle" ile istediğin an elle güncelleyebilirsin.
const DEFAULT_RATES = { USD: 46.85, EUR: 53.57, HUF: 0.1507 };

const STORAGE_KEYS = { entries: "kd-expenses", settings: "kd-settings" };

const fmtTRY = (n) =>
  new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 2 }).format(n || 0);
const fmtEUR = (n) =>
  new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR", maximumFractionDigits: 2 }).format(n || 0);

const fmtAmount = (n, code, currencies) => {
  const cur = currencies[code] || { symbol: code, flag: "" };
  const decimals = code === "HUF" ? 0 : 2;
  const num = new Intl.NumberFormat("tr-TR", { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(n || 0);
  // TL ve Forint gibi para birimlerinde sembol sona, diğerlerinde başa yazılır.
  return code === "TRY" || code === "HUF" ? `${num} ${cur.symbol}` : `${cur.symbol}${num}`;
};

const rateFor = (code, rates) => (code === "TRY" ? 1 : rates[code]);
const entryTL = (entry, rates) => entry.amount * (rateFor(entry.currency, rates) || 0);
const entryEUR = (entry, rates) => entryTL(entry, rates) / (rates.EUR || 1);

function App() {
  const [entries, setEntries] = useState([]);
  const [tripTitle, setTripTitle] = useState(DEFAULT_TITLE);
  const [currencies, setCurrencies] = useState(DEFAULT_CURRENCIES);
  const [rates, setRates] = useState(DEFAULT_RATES);
  const [rateSource, setRateSource] = useState("varsayılan");
  const [lastUpdated, setLastUpdated] = useState(null);
  const [showRateEditor, setShowRateEditor] = useState(false);

  const [editingTitle, setEditingTitle] = useState(false);
  const [titleDraft, setTitleDraft] = useState(DEFAULT_TITLE);

  const [newCode, setNewCode] = useState("");
  const [newSymbol, setNewSymbol] = useState("");
  const [newFlag, setNewFlag] = useState("");
  const [newRate, setNewRate] = useState("");

  const [amount, setAmount] = useState("");
  const [currency, setCurrency] = useState("EUR");
  const [description, setDescription] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.entries);
      if (raw) setEntries(JSON.parse(raw));
    } catch (e) { console.error("Kayıtlar okunamadı:", e); }
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.settings);
      if (raw) {
        const s = JSON.parse(raw);
        if (s.tripTitle) { setTripTitle(s.tripTitle); setTitleDraft(s.tripTitle); }
        if (s.currencies) setCurrencies(s.currencies);
        if (s.rates) setRates(s.rates);
        if (s.source) setRateSource(s.source);
        if (s.updated) setLastUpdated(s.updated);
      }
    } catch (e) { console.error("Ayarlar okunamadı:", e); }
  }, []);

  const persistEntries = (list) => {
    try { localStorage.setItem(STORAGE_KEYS.entries, JSON.stringify(list)); }
    catch (e) { console.error("Kayıt yazılamadı:", e); }
  };

  const persistSettings = (next) => {
    try { localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(next)); }
    catch (e) { console.error("Ayar yazılamadı:", e); }
  };

  const saveSettings = (patch) => {
    const next = {
      tripTitle: patch.tripTitle !== undefined ? patch.tripTitle : tripTitle,
      currencies: patch.currencies !== undefined ? patch.currencies : currencies,
      rates: patch.rates !== undefined ? patch.rates : rates,
      source: patch.source !== undefined ? patch.source : rateSource,
      updated: patch.updated !== undefined ? patch.updated : lastUpdated,
    };
    if (patch.tripTitle !== undefined) setTripTitle(patch.tripTitle);
    if (patch.currencies !== undefined) setCurrencies(patch.currencies);
    if (patch.rates !== undefined) setRates(patch.rates);
    if (patch.source !== undefined) setRateSource(patch.source);
    if (patch.updated !== undefined) setLastUpdated(patch.updated);
    persistSettings(next);
  };

  // ---- başlık düzenleme ----
  const startTitleEdit = () => { setTitleDraft(tripTitle); setEditingTitle(true); };
  const cancelTitleEdit = () => setEditingTitle(false);
  const saveTitleEdit = () => {
    const v = titleDraft.trim();
    if (v) saveSettings({ tripTitle: v.toUpperCase() });
    setEditingTitle(false);
  };

  // ---- kur / para birimi yönetimi ----
  const updateManualRate = (code, value) => {
    const v = parseFloat(String(value).replace(",", "."));
    if (!v || v <= 0) return;
    const nextRates = { ...rates, [code]: v };
    saveSettings({ rates: nextRates, source: "manuel", updated: new Date().toISOString() });
  };

  const addCurrency = () => {
    const code = newCode.trim().toUpperCase();
    const rate = parseFloat(String(newRate).replace(",", "."));
    if (!code || code.length < 2 || code.length > 5) return;
    if (currencies[code]) return;
    if (!rate || rate <= 0) return;
    const nextCurrencies = { ...currencies, [code]: { symbol: newSymbol.trim() || code, flag: newFlag.trim() } };
    const nextRates = { ...rates, [code]: rate };
    saveSettings({ currencies: nextCurrencies, rates: nextRates, source: "manuel", updated: new Date().toISOString() });
    setNewCode(""); setNewSymbol(""); setNewFlag(""); setNewRate("");
  };

  const removeCurrency = (code) => {
    if (code === "TRY") return;
    const nextCurrencies = { ...currencies };
    delete nextCurrencies[code];
    const nextRates = { ...rates };
    delete nextRates[code];
    saveSettings({ currencies: nextCurrencies, rates: nextRates });
    if (currency === code) setCurrency("TRY");
  };

  // ---- harcama işlemleri ----
  const addEntry = () => {
    const amt = parseFloat(String(amount).replace(",", "."));
    if (!amt || amt <= 0) return;
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      amount: amt, currency,
      description: description.trim(),
      date: new Date().toISOString(),
    };
    const next = [entry, ...entries];
    setEntries(next);
    persistEntries(next);
    setAmount("");
    setDescription("");
  };

  const deleteEntry = (id) => {
    const next = entries.filter((e) => e.id !== id);
    setEntries(next);
    persistEntries(next);
  };

  const startEdit = (entry) => {
    setEditingId(entry.id);
    setEditDraft({ amount: String(entry.amount), currency: entry.currency, description: entry.description });
  };

  const cancelEdit = () => { setEditingId(null); setEditDraft(null); };

  const saveEdit = (id) => {
    const amt = parseFloat(String(editDraft.amount).replace(",", "."));
    if (!amt || amt <= 0) return;
    const next = entries.map((e) =>
      e.id === id
        ? { ...e, amount: amt, currency: editDraft.currency, description: editDraft.description.trim() }
        : e
    );
    setEntries(next);
    persistEntries(next);
    cancelEdit();
  };

  const totalTL = entries.reduce((s, e) => s + entryTL(e, rates), 0);
  const totalEUR = entries.reduce((s, e) => s + entryEUR(e, rates), 0);
  const formattedDate = (iso) => new Date(iso).toLocaleDateString("tr-TR", { day: "2-digit", month: "short" });
  const foreignCodes = Object.keys(currencies).filter((c) => c !== "TRY");

  return (
    <div style={styles.page}>
      <div style={styles.container}>
        <div style={styles.header}>
          {editingTitle ? (
            <div style={styles.titleEditRow}>
              <input
                type="text"
                value={titleDraft}
                onChange={(e) => setTitleDraft(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") saveTitleEdit(); if (e.key === "Escape") cancelTitleEdit(); }}
                placeholder="örn. LONDRA, 2026"
                style={styles.titleInput}
                autoFocus
              />
              <button onClick={saveTitleEdit} style={styles.iconBtnSolid} title="Kaydet">✓</button>
              <button onClick={cancelTitleEdit} style={styles.iconBtnGhostDanger} title="Vazgeç">✕</button>
            </div>
          ) : (
            <div style={styles.eyebrow} onClick={startTitleEdit} title="Başlığı düzenlemek için tıkla">
              <span>✈️</span>
              <span>{tripTitle}</span>
              <span style={styles.titleEditHint}>✎</span>
            </div>
          )}
          <h1 style={styles.title}>Harcama Defteri</h1>
        </div>

        <div style={styles.tickerBar}>
          <div style={styles.tickerItems}>
            {foreignCodes.map((code) => (
              <div key={code} style={styles.tickerItem}>
                <span style={styles.tickerFlag}>{currencies[code].flag}</span>
                <span style={styles.tickerText}>1 {code} = <b>{fmtTRY(rates[code])}</b></span>
              </div>
            ))}
          </div>
          <div style={styles.tickerRight}>
            <span style={styles.tickerMeta}>
              {rateSource === "manuel" ? "Manuel kur" : "Varsayılan kur"}
              {lastUpdated ? ` · ${new Date(lastUpdated).toLocaleDateString("tr-TR")}` : ""}
            </span>
            <button onClick={() => setShowRateEditor((s) => !s)} className="kd-btn-ghost" style={styles.textBtn}>
              {showRateEditor ? "Kapat" : "Düzenle"}
            </button>
          </div>
        </div>

        {showRateEditor && (
          <div style={styles.rateEditor}>
            {foreignCodes.map((code) => (
              <div key={code} style={styles.rateEditorRow}>
                <label style={styles.rateEditorField}>
                  <span style={styles.rateEditorLabel}>{currencies[code].flag} 1 {code} =</span>
                  <input type="number" step="0.001" defaultValue={rates[code]}
                    onBlur={(e) => updateManualRate(code, e.target.value)}
                    style={styles.rateEditorInput} />
                  <span style={styles.rateEditorLabel}>TL</span>
                </label>
                <button onClick={() => removeCurrency(code)} style={styles.iconBtnDanger} title={`${code} para birimini kaldır`}>🗑</button>
              </div>
            ))}

            <div style={styles.addCurrencyRow}>
              <input type="text" placeholder="Kod (örn. GBP)" value={newCode}
                onChange={(e) => setNewCode(e.target.value.toUpperCase())}
                maxLength={5} style={styles.addCurrencyInputSmall} />
              <input type="text" placeholder="Sembol (£)" value={newSymbol}
                onChange={(e) => setNewSymbol(e.target.value)}
                maxLength={4} style={styles.addCurrencyInputSmall} />
              <input type="text" placeholder="Bayrak 🇬🇧" value={newFlag}
                onChange={(e) => setNewFlag(e.target.value)}
                maxLength={4} style={styles.addCurrencyInputSmall} />
              <input type="number" step="0.001" placeholder="1 birim kaç TL" value={newRate}
                onChange={(e) => setNewRate(e.target.value)}
                style={styles.addCurrencyInputRate} />
              <button onClick={addCurrency} style={styles.addCurrencyBtn}>+ Ekle</button>
            </div>
          </div>
        )}

        <div style={styles.ticket}>
          <div style={styles.ticketHalf}>
            <div style={styles.ticketLabel}>TOPLAM · TL</div>
            <div style={styles.ticketAmountTL}>{fmtTRY(totalTL)}</div>
          </div>
          <div style={styles.perforation}>
            <span style={{ ...styles.notch, top: -9 }} />
            <span style={{ ...styles.notch, bottom: -9 }} />
          </div>
          <div style={styles.ticketHalf}>
            <div style={styles.ticketLabel}>TOPLAM · EUR</div>
            <div style={styles.ticketAmountEUR}>{fmtEUR(totalEUR)}</div>
          </div>
        </div>

        <div style={styles.form}>
          <div style={styles.formRow}>
            <div style={styles.amountGroup}>
              <input type="number" inputMode="decimal" placeholder="0.00" value={amount}
                onChange={(e) => setAmount(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addEntry()}
                style={styles.amountInput} />
              <select className="kd-select" value={currency} onChange={(e) => setCurrency(e.target.value)} style={styles.currencySelect}>
                {Object.keys(currencies).map((code) => (
                  <option key={code} value={code}>{currencies[code].flag} {code}</option>
                ))}
              </select>
            </div>
            <input type="text" placeholder="Açıklama (opsiyonel) — örn. akşam yemeği" value={description}
              onChange={(e) => setDescription(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addEntry()}
              style={styles.descInput} />
            <button onClick={addEntry} style={styles.addBtn}>+ Ekle</button>
          </div>
          {amount && !isNaN(parseFloat(amount)) && currency !== "TRY" && (
            <div style={styles.livePreview}>
              ≈ {fmtTRY(parseFloat(String(amount).replace(",", ".")) * rateFor(currency, rates))} olarak kaydedilecek
            </div>
          )}
        </div>

        <div style={styles.listSection}>
          {entries.length === 0 ? (
            <div style={styles.empty}>
              <div style={styles.emptyTitle}>Henüz harcama yok</div>
              <div style={styles.emptyText}>İlk harcamanı yukarıdan ekleyerek deftere başla.</div>
            </div>
          ) : (
            entries.map((entry) => (
              <div key={entry.id} className="kd-row" style={styles.row}>
                {editingId === entry.id ? (
                  <div style={styles.editRow}>
                    <input type="number" value={editDraft.amount}
                      onChange={(e) => setEditDraft({ ...editDraft, amount: e.target.value })}
                      style={{ ...styles.amountInput, width: 90, fontSize: 14, padding: "8px 10px" }} />
                    <select className="kd-select" value={editDraft.currency}
                      onChange={(e) => setEditDraft({ ...editDraft, currency: e.target.value })}
                      style={{ ...styles.currencySelect, padding: "8px 8px" }}>
                      {Object.keys(currencies).map((code) => <option key={code} value={code}>{code}</option>)}
                    </select>
                    <input type="text" value={editDraft.description}
                      onChange={(e) => setEditDraft({ ...editDraft, description: e.target.value })}
                      placeholder="Açıklama"
                      style={{ ...styles.descInput, fontSize: 14, padding: "8px 10px" }} />
                    <button onClick={() => saveEdit(entry.id)} style={styles.iconBtnSolid} title="Kaydet">✓</button>
                    <button onClick={cancelEdit} style={styles.iconBtnGhostDanger} title="Vazgeç">✕</button>
                  </div>
                ) : (
                  <React.Fragment>
                    <div style={styles.rowDate}>{formattedDate(entry.date)}</div>
                    <div style={styles.rowMain}>
                      <div style={styles.rowDesc}>
                        {entry.description || <span style={{ color: "#9AA3B5" }}>Açıklama yok</span>}
                      </div>
                      <div style={styles.rowOrig}>
                        {(currencies[entry.currency] || {}).flag || ""} {fmtAmount(entry.amount, entry.currency, currencies)}
                      </div>
                    </div>
                    <div style={styles.rowTL}>{fmtTRY(entryTL(entry, rates))}</div>
                    <div className="kd-row-actions" style={styles.rowActions}>
                      <button onClick={() => startEdit(entry)} style={styles.iconBtn} title="Düzenle">✎</button>
                      <button onClick={() => deleteEntry(entry.id)} style={styles.iconBtnDanger} title="Sil">🗑</button>
                    </div>
                  </React.Fragment>
                )}
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

const styles = {
  page: { minHeight: "100vh", background: "#101B2D", backgroundImage: "radial-gradient(circle at 15% 0%, rgba(201,162,75,0.08), transparent 40%), radial-gradient(circle at 90% 20%, rgba(74,124,124,0.10), transparent 45%)", fontFamily: "'Inter', sans-serif", padding: "max(32px, env(safe-area-inset-top)) 16px 60px", display: "flex", justifyContent: "center" },
  container: { width: "100%", maxWidth: 560 },
  header: { marginBottom: 22, paddingLeft: 2 },
  eyebrow: { display: "flex", alignItems: "center", gap: 6, color: "#C9A24B", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11.5, letterSpacing: "0.14em", fontWeight: 600, marginBottom: 6, cursor: "pointer", width: "fit-content" },
  titleEditHint: { opacity: 0.6, fontSize: 11 },
  titleEditRow: { display: "flex", alignItems: "center", gap: 6, marginBottom: 6 },
  titleInput: { flex: 1, background: "rgba(247,241,227,0.08)", border: "1px solid rgba(247,241,227,0.2)", borderRadius: 6, color: "#F7F1E3", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, letterSpacing: "0.08em", padding: "6px 9px", textTransform: "uppercase" },
  title: { fontFamily: "'Fraunces', serif", fontSize: 34, fontWeight: 600, color: "#F7F1E3", margin: 0, letterSpacing: "-0.01em" },
  tickerBar: { display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, background: "rgba(247,241,227,0.05)", border: "1px solid rgba(247,241,227,0.10)", borderRadius: 12, padding: "10px 14px", marginBottom: 10 },
  tickerItems: { display: "flex", gap: 18, flexWrap: "wrap" },
  tickerItem: { display: "flex", alignItems: "center", gap: 6 },
  tickerFlag: { fontSize: 13 },
  tickerText: { color: "#C7CEDB", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5 },
  tickerRight: { display: "flex", alignItems: "center", gap: 8 },
  tickerMeta: { color: "#6E7891", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" },
  textBtn: { background: "transparent", border: "none", color: "#C9A24B", cursor: "pointer", fontSize: 12.5, fontWeight: 600, padding: "6px 8px", borderRadius: 8, fontFamily: "'Inter', sans-serif" },
  rateEditor: { display: "flex", flexDirection: "column", gap: 10, background: "rgba(247,241,227,0.04)", border: "1px solid rgba(247,241,227,0.10)", borderRadius: 12, padding: "12px 14px", marginBottom: 10 },
  rateEditorRow: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 },
  rateEditorField: { display: "flex", alignItems: "center", gap: 6 },
  rateEditorLabel: { color: "#9AA3B5", fontSize: 12.5, fontFamily: "'IBM Plex Mono', monospace" },
  rateEditorInput: { width: 70, background: "rgba(247,241,227,0.08)", border: "1px solid rgba(247,241,227,0.18)", borderRadius: 6, color: "#F7F1E3", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, padding: "5px 7px" },
  addCurrencyRow: { display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", paddingTop: 8, borderTop: "1px dashed rgba(247,241,227,0.14)" },
  addCurrencyInputSmall: { width: 74, background: "rgba(247,241,227,0.08)", border: "1px solid rgba(247,241,227,0.18)", borderRadius: 6, color: "#F7F1E3", fontFamily: "'Inter', sans-serif", fontSize: 12.5, padding: "6px 8px" },
  addCurrencyInputRate: { width: 96, background: "rgba(247,241,227,0.08)", border: "1px solid rgba(247,241,227,0.18)", borderRadius: 6, color: "#F7F1E3", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, padding: "6px 8px" },
  addCurrencyBtn: { background: "rgba(201,162,75,0.18)", border: "1px solid rgba(201,162,75,0.4)", borderRadius: 6, color: "#C9A24B", fontFamily: "'Inter', sans-serif", fontWeight: 600, fontSize: 12.5, padding: "6px 10px", cursor: "pointer" },
  ticket: { display: "flex", background: "#F7F1E3", borderRadius: 16, marginBottom: 20, position: "relative", boxShadow: "0 12px 30px -12px rgba(0,0,0,0.5)", overflow: "hidden" },
  ticketHalf: { flex: 1, padding: "20px 22px" },
  ticketLabel: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, letterSpacing: "0.12em", color: "#8A7A4E", fontWeight: 600, marginBottom: 6 },
  ticketAmountTL: { fontFamily: "'Fraunces', serif", fontSize: 27, fontWeight: 700, color: "#1B2A41", lineHeight: 1.1 },
  ticketAmountEUR: { fontFamily: "'Fraunces', serif", fontSize: 27, fontWeight: 700, color: "#3A5B5B", lineHeight: 1.1 },
  perforation: { width: 0, borderLeft: "2px dashed #D9CDA8", position: "relative", margin: "14px 0" },
  notch: { position: "absolute", left: -9, width: 18, height: 18, borderRadius: "50%", background: "#101B2D" },
  form: { marginBottom: 26 },
  formRow: { display: "flex", gap: 8, flexWrap: "wrap" },
  amountGroup: { display: "flex", flex: "1 1 200px" },
  amountInput: { flex: 1, minWidth: 90, background: "rgba(247,241,227,0.06)", border: "1px solid rgba(247,241,227,0.16)", borderRight: "none", borderRadius: "10px 0 0 10px", color: "#F7F1E3", fontFamily: "'IBM Plex Mono', monospace", fontSize: 15, padding: "12px 12px" },
  currencySelect: { background: "rgba(201,162,75,0.14)", border: "1px solid rgba(247,241,227,0.16)", borderRadius: "0 10px 10px 0", color: "#F7F1E3", fontFamily: "'Inter', sans-serif", fontSize: 13.5, fontWeight: 600, padding: "12px 10px", cursor: "pointer" },
  descInput: { flex: "2 1 220px", background: "rgba(247,241,227,0.06)", border: "1px solid rgba(247,241,227,0.16)", borderRadius: 10, color: "#F7F1E3", fontFamily: "'Inter', sans-serif", fontSize: 14, padding: "12px 14px" },
  addBtn: { display: "flex", alignItems: "center", gap: 6, background: "#C9A24B", border: "none", borderRadius: 10, color: "#101B2D", fontFamily: "'Inter', sans-serif", fontWeight: 700, fontSize: 14, padding: "12px 18px", cursor: "pointer" },
  livePreview: { marginTop: 8, fontSize: 12, color: "#7FA8A0", fontFamily: "'IBM Plex Mono', monospace", paddingLeft: 2 },
  listSection: { display: "flex", flexDirection: "column", gap: 2 },
  empty: { textAlign: "center", padding: "48px 20px", border: "1px dashed rgba(247,241,227,0.16)", borderRadius: 14 },
  emptyTitle: { color: "#F7F1E3", fontFamily: "'Fraunces', serif", fontSize: 18, marginBottom: 4 },
